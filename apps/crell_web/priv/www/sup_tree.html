<!DOCTYPE html>
<html lang="en" ng-app="CrellApp">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="Ruan pienaar">
    <link rel="icon" href="favicon.ico">
    <title>Supervision Tree</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="justified-nav.css" rel="stylesheet">
    <script type="text/javascript" src="angular-1.3.9/angular.min.js"></script>
    <script type="text/javascript" src="js/jquery-1.11.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script type="text/javascript" src="js/nodes_apps.js"></script>
</head>
<style>
    .node {
        cursor: pointer;
    }

    .node circle {
        fill: #fff;
        stroke: steelblue;
        stroke-width: 1.5px;
        transition: fill 0.2s;
    }

    .node circle:hover {
        stroke: #2171b5;
        stroke-width: 2.5px;
    }

    .node--collapsed circle {
        fill: lightsteelblue;
    }

    .node text {
        font: 12px sans-serif;
        pointer-events: none;
    }

    .link {
        fill: none;
        stroke: #ccc;
        stroke-width: 1.5px;
    }

    #tree-container {
        overflow: auto;
        border: 1px solid #eee;
        border-radius: 4px;
        background: #fafafa;
    }

    .tooltip {
        position: absolute;
        background: rgba(0,0,0,0.75);
        color: #fff;
        padding: 4px 8px;
        border-radius: 4px;
        font: 12px sans-serif;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        max-width: 300px;
        word-break: break-all;
    }
</style>
<body ng-controller="CrellController as ctrl">

    <div class="container-fluid">

        <div class="masthead">
            <nav>
                <ul class="nav nav-justified">
                    <li><a href="index.html">Nodes</a></li>
                    <li><a href="application.html">Applications</a></li>
                    <li><a href="processes.html">Processes</a></li>
                    <li><a href="processes_links.html">Processes Links</a></li>
                    <li class="active"><a href="sup_tree.html">Sup Tree</a></li>
                    <li><a href="db.html">DB</a></li>
                    <li><a href="modules.html">modules</a></li>
                    <li><a href="traces.html">Traces</a></li>
                    <li><a href="recon.html">Recon</a></li>
                </ul>
            </nav>
        </div>

        <div class="container-fluid">

            <h2>Erlang supervision tree</h2>

            <div class="form-inline">
                <p>Existing nodes <select class="form-control" id="nodes"></select></p>
            </div>

            <p>Applications</p>
            <select id="apps_select" onchange="draw()"></select>
            <button onclick="draw()" type="button">Update</button>

            <div id="tree-container"></div>
            <div class="tooltip" id="tooltip"></div>

            <script type="text/javascript">
            var draw; // hoisted so onclick="draw()" can reach it
            (function () {
                var NODE_HEIGHT    = 36;  // vertical spacing between nodes (px)
                var NODE_DEPTH     = 220; // horizontal spacing per depth level (px)
                var LABEL_MAX_LEN  = 28;  // truncate labels longer than this
                var NODE_RADIUS    = 6;
                var DURATION       = 400;

                var margin  = { top: 20, right: 160, bottom: 20, left: 160 };
                var svgElem = null;
                var gElem   = null;
                var treeFn  = null;
                var diagFn  = null;
                var root    = null;
                var nodeId  = 0;
                var tooltip = document.getElementById("tooltip");

                function maxDepth(node) {
                    if (!node.children && !node._children) return 0;
                    var ch = node.children || node._children;
                    return 1 + ch.reduce(function (m, c) { return Math.max(m, maxDepth(c)); }, 0);
                }

                function initSvg(totalHeight, depth) {
                    var minWidth = (depth + 1) * NODE_DEPTH;
                    var width    = Math.max(minWidth, 600);
                    var height   = Math.max(600, totalHeight);

                    d3.select("#tree-container").selectAll("svg").remove();

                    svgElem = d3.select("#tree-container")
                        .append("svg")
                        .attr("width",  width  + margin.left + margin.right)
                        .attr("height", height + margin.top  + margin.bottom)
                        .append("g")
                        .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

                    treeFn = d3.tree().size([height, width]);
                    diagFn = d3.linkHorizontal()
                        .x(function (d) { return d.y; })
                        .y(function (d) { return d.x; });

                    return { width: width, height: height };
                }

                function countLeaves(node) {
                    if (!node.children && !node._children) return 1;
                    var ch = node.children || node._children;
                    return ch.reduce(function (sum, c) { return sum + countLeaves(c); }, 0);
                }

                function truncate(text) {
                    if (!text) return "";
                    return text.length > LABEL_MAX_LEN
                        ? text.slice(0, LABEL_MAX_LEN) + "…"
                        : text;
                }

                function collapse(d) {
                    if (d.children) {
                        d._children = d.children;
                        d._children.forEach(collapse);
                        d.children = null;
                    }
                }

                draw = function () {
                    var app  = document.getElementById("apps_select").value;
                    var node = document.getElementById("nodes").value;

                    d3.json("crell_proc/app/" + app + "/node/" + node).then(function (data) {
                        // Seed unique ids on every fresh load
                        nodeId = 0;

                        root = d3.hierarchy(data, function (d) { return d.children; });
                        root.x0 = 0;
                        root.y0 = 0;

                        // Attach _children pattern used for collapse/expand
                        root.each(function (d) {
                            d._children = null;
                        });

                        var leaves = countLeaves(data);
                        var depth  = maxDepth(data);
                        var dim    = initSvg(leaves * NODE_HEIGHT, depth);

                        // Re-seed root sizes after init
                        root.x0 = dim.height / 2;
                        root.y0 = 0;

                        update(root);
                    }).catch(function (err) {
                        console.error("Failed to load tree data:", err);
                    });
                }

                function update(source) {
                    if (!svgElem) return;

                    // Resize SVG to fit visible nodes
                    var leaves  = countVisibleLeaves(root);
                    var depth   = maxDepth(root);
                    var height  = Math.max(600, leaves * NODE_HEIGHT);
                    var width   = Math.max((depth + 1) * NODE_DEPTH, 600);

                    treeFn.size([height, width]);
                    d3.select("#tree-container svg")
                        .attr("width",  width  + margin.left + margin.right)
                        .attr("height", height + margin.top  + margin.bottom);

                    var treeData = treeFn(root);
                    var nodes    = treeData.descendants();
                    var links    = treeData.links();

                    // Fixed depth spacing
                    nodes.forEach(function (d) { d.y = d.depth * NODE_DEPTH; });

                    // ---- NODES ----
                    var node = svgElem.selectAll("g.node")
                        .data(nodes, function (d) {
                            return d.id || (d.id = ++nodeId);
                        });

                    var nodeEnter = node.enter().append("g")
                        .attr("class", function (d) {
                            return "node" + (d._children ? " node--collapsed" : "");
                        })
                        .attr("transform", function () {
                            return "translate(" + source.y0 + "," + source.x0 + ")";
                        })
                        .on("click", function (event, d) {
                            if (d.children) {
                                d._children = d.children;
                                d.children  = null;
                            } else {
                                d.children  = d._children;
                                d._children = null;
                            }
                            update(d);
                        })
                        .on("mouseover", function (event, d) {
                            var name = d.data.name || "";
                            if (name.length > LABEL_MAX_LEN) {
                                tooltip.style.opacity = "1";
                                tooltip.textContent   = name;
                            }
                        })
                        .on("mousemove", function (event) {
                            tooltip.style.left = (event.pageX + 12) + "px";
                            tooltip.style.top  = (event.pageY - 24) + "px";
                        })
                        .on("mouseout", function () {
                            tooltip.style.opacity = "0";
                        });

                    nodeEnter.append("circle")
                        .attr("r", 1e-6)
                        .style("fill", function (d) {
                            return d._children ? "lightsteelblue" : "#fff";
                        });

                    nodeEnter.append("text")
                        .attr("x", function (d) {
                            return d.children || d._children ? -(NODE_RADIUS + 6) : (NODE_RADIUS + 6);
                        })
                        .attr("dy", "0.35em")
                        .attr("text-anchor", function (d) {
                            return d.children || d._children ? "end" : "start";
                        })
                        .text(function (d) { return truncate(d.data.name); })
                        .style("fill-opacity", 1e-6);

                    // Merge + transition to new position
                    var nodeUpdate = nodeEnter.merge(node)
                        .transition().duration(DURATION)
                        .attr("transform", function (d) {
                            return "translate(" + d.y + "," + d.x + ")";
                        })
                        .attr("class", function (d) {
                            return "node" + (d._children ? " node--collapsed" : "");
                        });

                    nodeUpdate.select("circle")
                        .attr("r", NODE_RADIUS)
                        .style("fill", function (d) {
                            return d._children ? "lightsteelblue" : "#fff";
                        });

                    nodeUpdate.select("text")
                        .style("fill-opacity", 1)
                        .attr("x", function (d) {
                            return d.children || d._children ? -(NODE_RADIUS + 6) : (NODE_RADIUS + 6);
                        })
                        .attr("text-anchor", function (d) {
                            return d.children || d._children ? "end" : "start";
                        })
                        .text(function (d) { return truncate(d.data.name); });

                    node.exit().transition().duration(DURATION)
                        .attr("transform", function () {
                            return "translate(" + source.y + "," + source.x + ")";
                        })
                        .remove()
                        .select("circle").attr("r", 1e-6);

                    node.exit().select("text").style("fill-opacity", 1e-6);

                    // ---- LINKS ----
                    var link = svgElem.selectAll("path.link")
                        .data(links, function (d) { return d.target.id; });

                    link.enter().insert("path", "g")
                        .attr("class", "link")
                        .attr("d", function () {
                            var o = { x: source.x0, y: source.y0 };
                            return diagFn({ source: o, target: o });
                        })
                        .merge(link)
                        .transition().duration(DURATION)
                        .attr("d", diagFn);

                    link.exit().transition().duration(DURATION)
                        .attr("d", function () {
                            var o = { x: source.x, y: source.y };
                            return diagFn({ source: o, target: o });
                        })
                        .remove();

                    // Stash positions
                    nodes.forEach(function (d) {
                        d.x0 = d.x;
                        d.y0 = d.y;
                    });
                }

                // Count visible (non-collapsed) leaves for height sizing
                function countVisibleLeaves(node) {
                    if (!node.children) return 1;
                    return node.children.reduce(function (sum, c) {
                        return sum + countVisibleLeaves(c);
                    }, 0);
                }

            })();
            </script>

        </div>

        <footer class="footer">
            <p>&copy; Ruan Pienaar</p>
        </footer>
    </div>

</body>
</html>
